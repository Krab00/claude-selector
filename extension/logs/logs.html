<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claude Selector — Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: #333;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
      margin-bottom: 10px;
    }
    .header h1 { font-size: 13px; font-weight: 600; color: #ccc; }
    .clear-btn {
      padding: 4px 10px;
      font-size: 11px;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 3px;
      cursor: pointer;
    }
    .clear-btn:hover { background: #444; }
    #logList {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .log-entry {
      padding: 4px 6px;
      border-radius: 2px;
      display: flex;
      gap: 8px;
      line-height: 1.4;
    }
    .log-entry:hover { background: #2a2a2a; }
    .log-time { color: #666; flex-shrink: 0; }
    .log-tag {
      flex-shrink: 0;
      padding: 0 4px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .log-tag.send { background: #1a3a1a; color: #4ec94e; }
    .log-tag.error { background: #3a1a1a; color: #e05555; }
    .log-tag.info { background: #1a2a3a; color: #5599dd; }
    .log-tag.select { background: #3a3a1a; color: #cccc44; }
    .log-msg { color: #d4d4d4; word-break: break-all; }
    .empty { color: #555; text-align: center; padding: 40px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claude Selector Logs</h1>
    <button class="clear-btn" id="clearBtn">Clear</button>
  </div>
  <div id="logList"><div class="empty">No logs yet</div></div>
  <script src="logs.js"></script>
</body>
</html>
