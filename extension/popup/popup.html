<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
      background: #f8f9fa;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      display: inline-block;
    }
    .status-dot.online { background: #34c759; }
    .status-dot.offline { background: #ff3b30; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
    }
    .toggle-btn {
      padding: 6px 16px;
      border: 1px solid #4A90D9;
      background: #fff;
      color: #4A90D9;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .toggle-btn.active {
      background: #4A90D9;
      color: #fff;
    }
    .element-list {
      max-height: 200px;
      overflow-y: auto;
      padding: 8px 16px;
      border-bottom: 1px solid #e5e5e5;
    }
    .element-list .empty {
      color: #999;
      text-align: center;
      padding: 16px 0;
      font-size: 12px;
    }
    .element-item {
      padding: 4px 0;
      font-family: monospace;
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .element-item .num {
      color: #4A90D9;
      font-weight: bold;
      margin-right: 4px;
    }
    .actions {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
    }
    .actions button {
      flex: 1;
      padding: 6px 4px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      color: #333;
    }
    .actions button:hover { background: #f0f0f0; }
    .actions button.primary {
      background: #4A90D9;
      color: #fff;
      border-color: #4A90D9;
    }
    .actions button.primary:hover { background: #3a7bc8; }
    .footer {
      padding: 8px 16px;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: #4A90D9;
      text-decoration: none;
      cursor: pointer;
    }
    .toast {
      display: none;
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 11px;
      z-index: 100;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Claude Selector</h1>
    <span class="status-dot" id="serverStatus" title="Server status"></span>
  </div>

  <div class="toggle-row">
    <span>Selection Mode</span>
    <button class="toggle-btn" id="toggleBtn">OFF</button>
  </div>

  <div class="element-list" id="elementList">
    <div class="empty">No elements selected</div>
  </div>

  <div class="actions">
    <button class="primary" id="sendBtn">Send to Server</button>
    <button id="copyBtn">Copy JSON</button>
    <button id="clearBtn">Clear</button>
  </div>

  <div class="footer">
    <a id="settingsLink">Settings</a>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
